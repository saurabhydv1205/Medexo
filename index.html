<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medexo – Global Health Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS VARIABLES ─────────────────────────────────── */
    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --surface2: #edeae5;
      --text: #1a1612;
      --text-muted: #7a756e;
      --accent: #c0392b;
      --accent2: #e74c3c;
      --accent-light: #fdecea;
      --green: #27ae60;
      --green-light: #eafaf1;
      --blue: #2980b9;
      --blue-light: #eaf4fb;
      --gold: #d4a017;
      --gold-light: #fdf6e3;
      --border: #ddd8d0;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.13);
      --radius: 16px;
    }

    [data-theme="dark"] {
      --bg: #111110;
      --surface: #1c1b19;
      --surface2: #252320;
      --text: #f0ede8;
      --text-muted: #8a857e;
      --accent: #e74c3c;
      --accent-light: #2a1512;
      --green-light: #0f2318;
      --blue-light: #0d1e2a;
      --gold-light: #1f1800;
      --border: #2e2c28;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* ─── RESET ─────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ─── HEADER ────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent); }

    nav { display: flex; align-items: center; gap: 8px; }

    /* ─── THEME TOGGLE ──────────────────────────────────── */
    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: grid;
      place-items: center;
      transition: background 0.2s, transform 0.2s;
    }
    .theme-toggle:hover { background: var(--border); transform: rotate(20deg); }

    /* Favs-only toggle */
    .favs-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .favs-toggle.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }
    .favs-toggle:hover { background: var(--border); }

    /* ─── HERO ──────────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, var(--accent) 0%, #922b21 100%);
      color: #fff;
      padding: 64px 32px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      margin-bottom: 12px;
      position: relative;
    }

    .hero p {
      font-size: 1.05rem;
      opacity: 0.85;
      max-width: 520px;
      margin: 0 auto 32px;
      position: relative;
      font-weight: 300;
    }

    /* ─── SEARCH ────────────────────────────────────────── */
    .search-wrap {
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 16px 52px 16px 20px;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      background: rgba(255,255,255,0.95);
      color: #1a1612;
      outline: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: box-shadow 0.2s;
    }

    .search-wrap input:focus { box-shadow: 0 4px 32px rgba(0,0,0,0.35); }
    .search-wrap input::placeholder { color: #aaa; }

    .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--accent);
    }

    /* Clear button inside search */
    .search-clear {
      position: absolute;
      right: 48px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: #aaa;
      display: none;
      padding: 0;
      transition: color 0.2s;
    }
    .search-clear:hover { color: var(--accent); }
    .search-clear.visible { display: block; }

    /* ─── STATS STRIP ───────────────────────────────────── */
    .stats-strip {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .stats-strip::-webkit-scrollbar { display: none; }

    .stat-item {
      flex: 1;
      min-width: 160px;
      padding: 20px 24px;
      border-right: 1px solid var(--border);
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    .stat-item:last-child { border-right: none; }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--text);
    }

    .stat-value.red { color: var(--accent); }
    .stat-value.green { color: var(--green); }
    .stat-value.blue { color: var(--blue); }

    /* ─── CONTROLS ──────────────────────────────────────── */
    .controls {
      padding: 20px 32px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .controls-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .controls select {
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls select:focus { border-color: var(--accent); }

    /* Sort order toggle button */
    .sort-dir-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      display: grid;
      place-items: center;
      transition: background 0.2s, transform 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .sort-dir-btn:hover { background: var(--border); color: var(--text); }

    .divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    .count-badge {
      margin-left: auto;
      background: var(--accent-light);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* ─── ACTIVE FILTER CHIPS ───────────────────────────── */
    .filter-chips {
      padding: 10px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 0;
    }

    .filter-chips:empty { display: none; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid rgba(192,57,43,0.2);
      padding: 4px 10px 4px 12px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 500;
      animation: chipIn 0.2s ease;
    }

    .chip-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-size: 14px;
      line-height: 1;
      padding: 0;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .chip-close:hover { opacity: 1; }

    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ─── GRID ──────────────────────────────────────────── */
    .grid-container {
      padding: 20px 32px 56px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 20px;
    }

    /* ─── CARD ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
      animation: fadeUp 0.4s ease both;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.25);
    }

    /* Favourite glow ring */
    .card.fav-active {
      border-color: rgba(192,57,43,0.5);
      box-shadow: var(--shadow), 0 0 0 2px rgba(192,57,43,0.12);
    }

    /* Favourite ribbon */
    .card.fav-active::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-top: 32px solid var(--accent);
      border-left: 32px solid transparent;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .flag { font-size: 2rem; line-height: 1; }

    .country-info h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text);
    }

    .continent-tag {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Mortality rate badge */
    .mortality-badge {
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 50px;
      background: var(--gold-light);
      color: var(--gold);
      white-space: nowrap;
    }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      padding: 10px 12px;
      border-radius: 10px;
      text-align: center;
      transition: transform 0.15s;
    }

    .stat-box:hover { transform: scale(1.03); }

    .stat-box.cases     { background: var(--accent-light); }
    .stat-box.deaths    { background: var(--gold-light);   }
    .stat-box.recovered { background: var(--green-light);  }
    .stat-box.active    { background: var(--blue-light);   }

    .stat-box .val {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      color: var(--text);
    }

    .stat-box.cases     .val { color: var(--accent); }
    .stat-box.deaths    .val { color: var(--gold);   }
    .stat-box.recovered .val { color: var(--green);  }
    .stat-box.active    .val { color: var(--blue);   }

    .stat-box .lbl {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 500;
    }

    /* ─── PROGRESS BAR (recovery rate) ─────────────────── */
    .recovery-bar-wrap {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .recovery-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 500;
    }

    .recovery-track {
      height: 5px;
      background: var(--surface2);
      border-radius: 50px;
      overflow: hidden;
    }

    .recovery-fill {
      height: 100%;
      background: var(--green);
      border-radius: 50px;
      transition: width 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* ─── CARD FOOTER ───────────────────────────────────── */
    .card-footer {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .updated {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ─── ICON BUTTONS ──────────────────────────────────── */
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      transition: transform 0.2s, background 0.15s;
      padding: 0;
    }

    .icon-btn:hover { background: var(--surface2); transform: scale(1.15); }
    .icon-btn:active { transform: scale(0.95); }

    /* Like button pulse */
    .icon-btn.liked {
      animation: likePulse 0.35s ease;
    }

    @keyframes likePulse {
      0%   { transform: scale(1);   }
      40%  { transform: scale(1.4); }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1);   }
    }

    /* ─── EXPAND DETAIL ─────────────────────────────────── */
    .card-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s;
      opacity: 0;
    }

    .card-detail.open {
      max-height: 180px;
      opacity: 1;
    }

    .detail-inner {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .detail-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-row .dk {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .detail-row .dv {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--text);
    }

    /* ─── LOADER ────────────────────────────────────────── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      gap: 16px;
      grid-column: 1 / -1;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loader p { color: var(--text-muted); font-size: 0.9rem; }

    /* ─── EMPTY STATES ──────────────────────────────────── */
    .error-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 32px;
      color: var(--accent);
      font-size: 1rem;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 32px;
      color: var(--text-muted);
    }

    .no-results span { font-size: 3rem; display: block; margin-bottom: 12px; }

    .no-results h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text);
      font-weight: 400;
      margin-bottom: 8px;
    }

    .no-results p { font-size: 0.9rem; }

    /* ─── TOAST ─────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── ANIMATIONS ────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE ────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 16px; }
      .hero { padding: 44px 16px 36px; }
      .controls { padding: 14px 16px 10px; }
      .filter-chips { padding: 8px 16px; }
      .grid-container { padding: 12px 16px 40px; grid-template-columns: 1fr; }
      .stats-strip { display: grid; grid-template-columns: 1fr 1fr; }
      .stat-item { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
      .count-badge { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ──────────────────────────────────────────────── -->
  <header>
    <a class="logo" href="#">
      <div class="logo-icon">🏥</div>
      <span class="logo-text">Med<span>exo</span></span>
    </a>
    <nav>
      <!-- FEATURE 5: Favourites-only filter in nav -->
      <button class="favs-toggle" id="favsOnlyBtn" title="Show favourites only">❤️ Favourites</button>
      <!-- FEATURE 4 (dark mode): Theme toggle -->
      <button class="theme-toggle" id="themeBtn" title="Toggle dark mode">🌙</button>
    </nav>
  </header>

  <!-- ─── HERO + SEARCH ───────────────────────────────────────── -->
  <section class="hero">
    <h1>Global Health Dashboard</h1>
    <p>Live disease statistics from around the world, powered by real-time data.</p>
    <!-- FEATURE 1: Search -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search country…" autocomplete="off" />
      <button class="search-clear" id="searchClear" title="Clear">✕</button>
      <span class="search-icon">🔍</span>
    </div>
  </section>

  <!-- ─── GLOBAL STATS STRIP ──────────────────────────────────── -->
  <div class="stats-strip">
    <div class="stat-item" style="animation-delay:.05s">
      <div class="stat-label">Total Cases</div>
      <div class="stat-value red" id="globalCases">—</div>
    </div>
    <div class="stat-item" style="animation-delay:.1s">
      <div class="stat-label">Total Deaths</div>
      <div class="stat-value" style="color:var(--gold)" id="globalDeaths">—</div>
    </div>
    <div class="stat-item" style="animation-delay:.15s">
      <div class="stat-label">Recovered</div>
      <div class="stat-value green" id="globalRecovered">—</div>
    </div>
    <div class="stat-item" style="animation-delay:.2s">
      <div class="stat-label">Active Cases</div>
      <div class="stat-value blue" id="globalActive">—</div>
    </div>
    <div class="stat-item" style="animation-delay:.25s">
      <div class="stat-label">Countries</div>
      <div class="stat-value" id="globalCountries">—</div>
    </div>
  </div>

  <!-- ─── CONTROLS ────────────────────────────────────────────── -->
  <div class="controls">
    <!-- FEATURE 3: Sort -->
    <div class="controls-group">
      <label>Sort by</label>
      <select id="sortSelect">
        <option value="cases">Total Cases</option>
        <option value="deaths">Deaths</option>
        <option value="recovered">Recovered</option>
        <option value="active">Active</option>
        <option value="country">Country (A–Z)</option>
        <option value="mortality">Mortality Rate</option>
      </select>
      <!-- Sort direction toggle -->
      <button class="sort-dir-btn" id="sortDirBtn" title="Toggle sort direction">↓</button>
    </div>

    <div class="divider"></div>

    <!-- FEATURE 2: Filter by continent -->
    <div class="controls-group">
      <label>Continent</label>
      <select id="continentSelect">
        <option value="all">All Continents</option>
        <option value="Asia">Asia</option>
        <option value="Europe">Europe</option>
        <option value="North America">North America</option>
        <option value="South America">South America</option>
        <option value="Africa">Africa</option>
        <option value="Australia/Oceania">Oceania</option>
      </select>
    </div>

    <div class="divider"></div>

    <!-- FEATURE 2: Filter by case severity -->
    <div class="controls-group">
      <label>Cases</label>
      <select id="severitySelect">
        <option value="all">Any range</option>
        <option value="high">High (1M+)</option>
        <option value="medium">Medium (100K–1M)</option>
        <option value="low">Low (&lt;100K)</option>
      </select>
    </div>

    <span class="count-badge" id="countBadge">Loading…</span>
  </div>

  <!-- ─── ACTIVE FILTER CHIPS ──────────────────────────────────── -->
  <div class="filter-chips" id="filterChips"></div>

  <!-- ─── GRID ─────────────────────────────────────────────────── -->
  <div class="grid-container" id="grid">
    <div class="loader">
      <div class="spinner"></div>
      <p>Fetching live health data…</p>
    </div>
  </div>

  <!-- ─── TOAST ────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ─────────────────────────────────────────────────────────── -->
  <script>
    // ════════════════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════════════════
    let allCountries  = [];
    let favorites     = JSON.parse(localStorage.getItem('medexo_favs')   || '[]');
    let likes         = JSON.parse(localStorage.getItem('medexo_likes')  || '[]');
    let sortDir       = 'desc'; // 'asc' | 'desc'
    let favsOnly      = false;
    let expandedCards = new Set();

    // ════════════════════════════════════════════════════════════
    //  FEATURE 4 — DARK / LIGHT MODE TOGGLE
    // ════════════════════════════════════════════════════════════
    const themeBtn   = document.getElementById('themeBtn');
    const savedTheme = localStorage.getItem('medexo_theme') || 'light';

    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeBtn.textContent = '☀️';
    }

    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const next   = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      themeBtn.textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('medexo_theme', next);
      showToast(isDark ? 'Light mode on ☀️' : 'Dark mode on 🌙');
    });

    // ════════════════════════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════════════════════════
    const fmt = n => (n == null || isNaN(n)) ? 'N/A' : Number(n).toLocaleString();

    const pct = (a, b) => (b && b > 0) ? ((a / b) * 100).toFixed(1) + '%' : 'N/A';

    const timeAgo = ts => {
      const h = Math.floor((Date.now() - ts) / 3_600_000);
      if (h < 1)  return 'Just now';
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    };

    const countryFlag = iso2 => {
      if (!iso2) return '🌍';
      return [...iso2.toUpperCase()]
        .map(c => String.fromCodePoint(0x1F1E0 + c.charCodeAt(0) - 65))
        .join('');
    };

    // ════════════════════════════════════════════════════════════
    //  TOAST
    // ════════════════════════════════════════════════════════════
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ════════════════════════════════════════════════════════════
    //  FETCH GLOBAL STATS
    // ════════════════════════════════════════════════════════════
    async function fetchGlobalStats() {
      try {
        const res  = await fetch('https://disease.sh/v3/covid-19/all');
        if (!res.ok) throw new Error();
        const data = await res.json();
        document.getElementById('globalCases').textContent      = fmt(data.cases);
        document.getElementById('globalDeaths').textContent     = fmt(data.deaths);
        document.getElementById('globalRecovered').textContent  = fmt(data.recovered);
        document.getElementById('globalActive').textContent     = fmt(data.active);
        document.getElementById('globalCountries').textContent  = fmt(data.affectedCountries);
      } catch { /* silent */ }
    }

    // ════════════════════════════════════════════════════════════
    //  FETCH COUNTRIES
    // ════════════════════════════════════════════════════════════
    async function fetchCountries() {
      try {
        const res  = await fetch('https://disease.sh/v3/covid-19/countries?sort=cases');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allCountries = await res.json();
        renderCards(allCountries);
      } catch (err) {
        document.getElementById('grid').innerHTML =
          `<div class="error-msg">⚠️ Could not load data. Please check your connection and refresh.</div>`;
      }
    }

    // ════════════════════════════════════════════════════════════
    //  FEATURE 1 + 2 + 3 — SEARCH / FILTER / SORT  (Array HOFs)
    // ════════════════════════════════════════════════════════════
    function applyFilters() {
      const query     = document.getElementById('searchInput').value.trim().toLowerCase();
      const sortBy    = document.getElementById('sortSelect').value;
      const continent = document.getElementById('continentSelect').value;
      const severity  = document.getElementById('severitySelect').value;

      const result = allCountries
        // ── 1. SEARCH — Array.filter() ──────────────────────
        .filter(c => c.country.toLowerCase().includes(query))

        // ── 2a. FILTER by continent — Array.filter() ────────
        .filter(c => continent === 'all' || c.continent === continent)

        // ── 2b. FILTER by severity — Array.filter() ─────────
        .filter(c => {
          if (severity === 'all')    return true;
          if (severity === 'high')   return c.cases >= 1_000_000;
          if (severity === 'medium') return c.cases >= 100_000 && c.cases < 1_000_000;
          if (severity === 'low')    return c.cases < 100_000;
          return true;
        })

        // ── 2c. FILTER favourites only — Array.filter() ─────
        .filter(c => !favsOnly || favorites.includes(c.country))

        // ── 3. SORT — Array.sort() ───────────────────────────
        .sort((a, b) => {
          let cmp;
          if (sortBy === 'country') {
            cmp = a.country.localeCompare(b.country);
          } else if (sortBy === 'mortality') {
            const mA = a.cases ? a.deaths / a.cases : 0;
            const mB = b.cases ? b.deaths / b.cases : 0;
            cmp = mB - mA;
          } else {
            cmp = (b[sortBy] ?? 0) - (a[sortBy] ?? 0);
          }
          // Apply sort direction
          return sortDir === 'asc' ? -cmp : cmp;
        });

      renderCards(result);
      updateChips({ query, continent, severity });
    }

    // ════════════════════════════════════════════════════════════
    //  ACTIVE FILTER CHIPS
    // ════════════════════════════════════════════════════════════
    function updateChips({ query, continent, severity }) {
      const container = document.getElementById('filterChips');

      // Build chips using Array.map() + Array.filter()
      const chips = [
        query    ? { label: `"${query}"`,       clear: () => { document.getElementById('searchInput').value = ''; applyFilters(); } } : null,
        continent !== 'all' ? { label: continent, clear: () => { document.getElementById('continentSelect').value = 'all'; applyFilters(); } } : null,
        severity !== 'all'  ? { label: severity + ' cases', clear: () => { document.getElementById('severitySelect').value = 'all'; applyFilters(); } } : null,
        favsOnly ? { label: 'Favourites only', clear: () => { favsOnly = false; document.getElementById('favsOnlyBtn').classList.remove('active'); applyFilters(); } } : null,
      ].filter(Boolean);

      container.innerHTML = chips
        .map((chip, i) =>
          `<span class="chip">
            ${chip.label}
            <button class="chip-close" data-chip="${i}">✕</button>
          </span>`)
        .join('');

      // Attach clear handlers
      container.querySelectorAll('.chip-close').forEach(btn => {
        btn.addEventListener('click', () => chips[+btn.dataset.chip].clear());
      });
    }

    // ════════════════════════════════════════════════════════════
    //  RENDER CARDS
    // ════════════════════════════════════════════════════════════
    function renderCards(countries) {
      const grid = document.getElementById('grid');
      document.getElementById('countBadge').textContent = `${countries.length} countr${countries.length === 1 ? 'y' : 'ies'}`;

      if (!countries.length) {
        grid.innerHTML = `
          <div class="no-results">
            <span>🔎</span>
            <h3>No results found</h3>
            <p>Try a different search term or adjust the filters above.</p>
          </div>`;
        return;
      }

      // Build card HTML using Array.map()
      grid.innerHTML = countries
        .map((c, i) => {
          const isFav      = favorites.includes(c.country);
          const isLiked    = likes.includes(c.country);
          const isExpanded = expandedCards.has(c.country);
          const mortality  = c.cases ? ((c.deaths / c.cases) * 100).toFixed(2) + '%' : 'N/A';
          const recovPct   = c.cases ? Math.min(Math.round((c.recovered / c.cases) * 100), 100) : 0;

          return `
          <div class="card${isFav ? ' fav-active' : ''}"
               style="animation-delay:${Math.min(i * 0.04, 0.6)}s"
               data-country="${c.country}">

            <div class="card-header">
              <div class="flag">${countryFlag(c.countryInfo?.iso2)}</div>
              <div class="country-info">
                <h3>${c.country}</h3>
                <div class="continent-tag">${c.continent || 'Unknown'}</div>
              </div>
              <span class="mortality-badge" title="Case-fatality rate">💀 ${mortality}</span>
            </div>

            <div class="card-stats">
              <div class="stat-box cases">
                <div class="val">${fmt(c.cases)}</div>
                <div class="lbl">Total Cases</div>
              </div>
              <div class="stat-box deaths">
                <div class="val">${fmt(c.deaths)}</div>
                <div class="lbl">Deaths</div>
              </div>
              <div class="stat-box recovered">
                <div class="val">${fmt(c.recovered)}</div>
                <div class="lbl">Recovered</div>
              </div>
              <div class="stat-box active">
                <div class="val">${fmt(c.active)}</div>
                <div class="lbl">Active</div>
              </div>
            </div>

            <!-- Recovery Progress Bar -->
            <div class="recovery-bar-wrap">
              <div class="recovery-label">
                <span>Recovery rate</span>
                <span>${recovPct}%</span>
              </div>
              <div class="recovery-track">
                <div class="recovery-fill" style="width:${recovPct}%"></div>
              </div>
            </div>

            <!-- FEATURE 4: "View More" expandable detail -->
            <div class="card-detail${isExpanded ? ' open' : ''}" id="detail-${c.country.replace(/\s/g,'_')}">
              <div class="detail-inner">
                <div class="detail-row">
                  <span class="dk">Today's Cases</span>
                  <span class="dv">+${fmt(c.todayCases)}</span>
                </div>
                <div class="detail-row">
                  <span class="dk">Today's Deaths</span>
                  <span class="dv">+${fmt(c.todayDeaths)}</span>
                </div>
                <div class="detail-row">
                  <span class="dk">Critical</span>
                  <span class="dv">${fmt(c.critical)}</span>
                </div>
                <div class="detail-row">
                  <span class="dk">Tests Done</span>
                  <span class="dv">${fmt(c.tests)}</span>
                </div>
                <div class="detail-row">
                  <span class="dk">Population</span>
                  <span class="dv">${fmt(c.population)}</span>
                </div>
                <div class="detail-row">
                  <span class="dk">Cases / 1M</span>
                  <span class="dv">${fmt(Math.round(c.casesPerOneMillion))}</span>
                </div>
              </div>
            </div>

            <!-- Card Footer with action buttons -->
            <div class="card-footer">
              <span class="updated">Updated ${timeAgo(c.updated)}</span>
              <div class="card-actions">
                <!-- FEATURE 4a: Like button -->
                <button class="icon-btn like-btn${isLiked ? ' liked' : ''}"
                        data-name="${c.country}"
                        title="${isLiked ? 'Unlike' : 'Like'}">
                  ${isLiked ? '👍' : '👍'}
                </button>

                <!-- FEATURE 4b: Favourite button -->
                <button class="icon-btn fav-btn"
                        data-name="${c.country}"
                        title="${isFav ? 'Remove favourite' : 'Add favourite'}">
                  ${isFav ? '❤️' : '🤍'}
                </button>

                <!-- FEATURE 4c: View More button -->
                <button class="icon-btn expand-btn"
                        data-name="${c.country}"
                        title="${isExpanded ? 'Show less' : 'View more'}">
                  ${isExpanded ? '🔼' : '🔽'}
                </button>
              </div>
            </div>

          </div>`;
        })
        .join('');

      // ── LIKE button events ────────────────────────────────
      grid.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const name = btn.dataset.name;
          if (likes.includes(name)) {
            likes = likes.filter(l => l !== name);
            btn.style.opacity = '0.45';
            showToast(`Removed like from ${name}`);
          } else {
            likes.push(name);
            btn.classList.add('liked');
            btn.style.opacity = '1';
            showToast(`Liked ${name} 👍`);
          }
          localStorage.setItem('medexo_likes', JSON.stringify(likes));
        });
      });

      // ── FAVOURITE button events ───────────────────────────
      grid.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const name = btn.dataset.name;
          const card = btn.closest('.card');
          if (favorites.includes(name)) {
            favorites = favorites.filter(f => f !== name);
            btn.textContent = '🤍';
            card.classList.remove('fav-active');
            showToast(`Removed ${name} from favourites`);
          } else {
            favorites.push(name);
            btn.textContent = '❤️';
            card.classList.add('fav-active');
            showToast(`Added ${name} to favourites ❤️`);
          }
          localStorage.setItem('medexo_favs', JSON.stringify(favorites));
          if (favsOnly) applyFilters();
        });
      });

      // ── VIEW MORE (expand) button events ─────────────────
      grid.querySelectorAll('.expand-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const name   = btn.dataset.name;
          const key    = name.replace(/\s/g, '_');
          const detail = document.getElementById(`detail-${key}`);
          const open   = detail.classList.toggle('open');
          expandedCards[open ? 'add' : 'delete'](name);
          btn.textContent = open ? '🔼' : '🔽';
          btn.title       = open ? 'Show less' : 'View more';
        });
      });
    }

    // ════════════════════════════════════════════════════════════
    //  SORT DIRECTION TOGGLE
    // ════════════════════════════════════════════════════════════
    document.getElementById('sortDirBtn').addEventListener('click', () => {
      sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      document.getElementById('sortDirBtn').textContent = sortDir === 'desc' ? '↓' : '↑';
      showToast(sortDir === 'asc' ? 'Sorted ascending ↑' : 'Sorted descending ↓');
      applyFilters();
    });

    // ════════════════════════════════════════════════════════════
    //  FAVOURITES-ONLY TOGGLE
    // ════════════════════════════════════════════════════════════
    document.getElementById('favsOnlyBtn').addEventListener('click', () => {
      favsOnly = !favsOnly;
      document.getElementById('favsOnlyBtn').classList.toggle('active', favsOnly);
      showToast(favsOnly ? 'Showing favourites only ❤️' : 'Showing all countries');
      applyFilters();
    });

    // ════════════════════════════════════════════════════════════
    //  SEARCH CLEAR BUTTON
    // ════════════════════════════════════════════════════════════
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    searchInput.addEventListener('input', () => {
      searchClear.classList.toggle('visible', searchInput.value.length > 0);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      searchInput.focus();
      applyFilters();
    });

    // ════════════════════════════════════════════════════════════
    //  DEBOUNCE UTILITY
    // ════════════════════════════════════════════════════════════
    function debounce(fn, delay) {
      let timer;
      return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
    }

    // ════════════════════════════════════════════════════════════
    //  EVENT LISTENERS
    // ════════════════════════════════════════════════════════════
    searchInput.addEventListener('input', debounce(applyFilters, 300));
    document.getElementById('sortSelect').addEventListener('change', applyFilters);
    document.getElementById('continentSelect').addEventListener('change', applyFilters);
    document.getElementById('severitySelect').addEventListener('change', applyFilters);

    // ════════════════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════════════════
    fetchGlobalStats();
    fetchCountries();
  </script>
</body>
</html>
